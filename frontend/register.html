<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Conduit</title>
    <!-- Import Ionicon icons & Google Fonts our Bootstrap theme relies on -->
    <link href="https://code.ionicframework.com/ionicons/2.0.1/css/ionicons.min.css" rel="stylesheet" type="text/css" />
    <link
        href="https://fonts.googleapis.com/css?family=Titillium+Web:700|Source+Serif+Pro:400,700|Merriweather+Sans:400,700|Source+Sans+Pro:400,300,600,700,300italic,400italic,600italic,700italic"
        rel="stylesheet" type="text/css" />
    <!-- Import the custom Bootstrap 4 theme from our hosted CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="/conduit/frontend/assets/css/style.css" rel="stylesheet" type="text/css" />
</head>

<body>
    <header>
        <nav class="navbar navbar-light">
            <div class="container">
                <a class="navbar-brand" style="font-size:32px; font-weight: 600;" href="/conduit/">conduit</a>
                <ul class="nav navbar-nav pull-xs-right d-flex flex-row gap-3">
                    <li class="nav-item">
                        <!-- Add "active" class when you're on that page" -->
                        <a class="nav-link active" href="/conduit/">Home</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="/conduit/login">Sign in</a></li>
                    <li class="nav-item"><a class="nav-link" href="/conduit/register">Sign up</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <div class="auth-page">
        <div class="container page">
            <div class="row">
                <div class="col-md-6 offset-md-3 col-xs-12">
                    <h1 class="text-xs-center">Sign up</h1>
                    <p class="text-xs-center">
                        <a href="/conduit/login">Have an account?</a>
                    </p>

                    <ul class="error-messages">
                        <li>That email is already taken</li>
                    </ul>

                    <form>
                        <fieldset class="form-group">
                            <input class="form-control form-control-lg" type="text" placeholder="Username" />
                        </fieldset>
                        <fieldset class="form-group">
                            <input class="form-control form-control-lg" type="text" placeholder="Email" />
                        </fieldset>
                        <fieldset class="form-group">
                            <input class="form-control form-control-lg" type="password" placeholder="Password" />
                        </fieldset>
                        <button class="btn btn-lg btn-primary pull-xs-right">Sign up</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container justify-content-center d-flex">
            <a href="/conduit/" class="logo-font">conduit</a>
            <span class="attribution">
                An interactive learning project. Code &amp; design licensed under MIT.
            </span>
        </div>
    </footer>
</body>

</html>
